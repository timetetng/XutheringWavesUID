<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>全部角色别名</title>
<style>
    @import url('{{ font_css_url }}');

    :root {
        --c-bg: #0f1115;
        --c-accent: #e8c963;
        --c-subtext: #8b8b8b;
        --c-card-bg: rgba(30, 34, 42, 0.7);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        width: 800px;
        background-color: var(--c-bg);
        font-family: 'Source Han Sans CN', 'Noto Sans CJK JP', sans-serif;
        color: #fff;
        position: relative;
    }

    .bg-layer {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        z-index: 0;
    }
    .bg-layer img { width: 100%; height: 100%; object-fit: cover; opacity: 0.15; }

    .container {
        position: relative;
        z-index: 10;
        padding: 40px;
        padding-bottom: 80px;
    }

    .title {
        font-size: 32px;
        font-weight: 900;
        color: var(--c-accent);
        margin-bottom: 6px;
    }
    .subtitle {
        font-family: 'JetBrains Mono';
        font-size: 13px;
        color: var(--c-subtext);
        margin-bottom: 24px;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
    }

    .card {
        background: var(--c-card-bg);
        border: 1px solid rgba(255,255,255,0.06);
        padding: 14px 16px;
        border-radius: 8px;
        backdrop-filter: blur(4px);
    }

    .card-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 8px;
        border-bottom: 1px solid rgba(255,255,255,0.06);
        padding-bottom: 8px;
    }

    .card-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        object-fit: cover;
        border: 1px solid rgba(232,201,99,0.3);
        flex-shrink: 0;
        background: #222;
    }

    .card-name {
        font-size: 18px;
        font-weight: 800;
        color: #fff;
    }

    .card-aliases {
        display: flex;
        flex-wrap: wrap;
        gap: 4px 6px;
    }

    .alias-tag {
        font-size: 12px;
        color: #aaa;
        background: rgba(255,255,255,0.06);
        padding: 2px 8px;
        border-radius: 3px;
    }

    .footer {
        position: absolute;
        bottom: 0; left: 0; width: 100%;
        height: 60px;
        background: rgba(10,10,12,0.98);
        border-top: 1px solid rgba(232,201,99,0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 40px;
        z-index: 50;
    }
    {% if footer_b64 %}
    .footer-img { height: 30px; }
    {% endif %}
    .footer-text { font-family: 'JetBrains Mono'; font-size: 13px; color: var(--c-subtext); }
</style>
</head>
<body>
    <div class="bg-layer">
        {% if bg_url %}<img src="{{ bg_url }}">{% endif %}
    </div>

    <div class="container">
        <div class="title">角色别名表</div>
        <div class="subtitle">ALIAS TABLE // {{ total }} CHARACTERS</div>

        <div class="grid">
            {% for item in chars %}
            <div class="card">
                <div class="card-header">
                    {% if item.avatar %}
                    <img src="{{ item.avatar }}" class="card-avatar">
                    {% else %}
                    <div class="card-avatar" style="display:flex;justify-content:center;align-items:center;color:#555;font-size:16px;">?</div>
                    {% endif %}
                    <div class="card-name">{{ item.name }}</div>
                </div>
                <div class="card-aliases">
                    {% for a in item.aliases %}
                    <div class="alias-tag">{{ a }}</div>
                    {% endfor %}
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <div class="footer">
        {% if footer_b64 %}
        <img src="{{ footer_b64 }}" class="footer-img">
        {% else %}
        <div class="footer-text">WUTHERING WAVES ALIAS TABLE</div>
        {% endif %}
    </div>
</body>
</html>
